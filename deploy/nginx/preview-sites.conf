# Preview subdomains for portfolio iframes (HTTPS → local ports).
# Copy to /etc/nginx/sites-available/ on the server, then:
#   sudo ln -s /etc/nginx/sites-available/preview-sites.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d academy.neostudio.space -d jelly.neostudio.space -d petcare.neostudio.space -d aura.neostudio.space

server {
    listen 80;
    server_name academy.neostudio.space;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

